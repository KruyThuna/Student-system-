<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* Layout */
.wrapper {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #2c3e50;
    color: white;
    padding: 20px;
    height: 100vh;
}

.sidebar h2 {
    text-align: center;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 5px;
}

.sidebar a:hover {
    background: #34495e;
}

/* Content */
.content {
    flex: 1;
    padding: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* Form */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

/* Button */
button {
    padding: 10px;
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>System</h2>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('add')">Add Student</a>
    <a onclick="showSection('view')">View Students</a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- HOME -->
    <div id="home" class="card">
        <h1>Student Management System</h1>
        <p>Welcome! Use menu to manage students.</p>
    </div>

    <!-- ADD -->
    <div id="add" class="card" style="display:none;">
        <h2>Add Student</h2>

        <input type="text" id="id" placeholder="Student ID">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="course" placeholder="Course">

        <button onclick="addStudent()">Save</button>
    </div>

    <!-- VIEW -->
    <div id="view" class="card" style="display:none;">
        <h2>Student List</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>
</div>

<script>

// SWITCH SECTION
function showSection(section) {
    document.getElementById("home").style.display = "none";
    document.getElementById("add").style.display = "none";
    document.getElementById("view").style.display = "none";

    document.getElementById(section).style.display = "block";

    if(section === "view") displayStudents();
}

// GET DATA
function getStudents() {
    return JSON.parse(localStorage.getItem("students")) || [];
}

// SAVE DATA
function saveStudents(data) {
    localStorage.setItem("students", JSON.stringify(data));
}

// ADD
function addStudent() {
    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let course = document.getElementById("course").value;

    let students = getStudents();

    students.push({ id, name, course });

    saveStudents(students);

    alert("Student Added!");

    document.getElementById("id").value = "";
    document.getElementById("name").value = "";
    document.getElementById("course").value = "";
}

// DISPLAY
function displayStudents() {
    let students = getStudents();
    let table = document.getElementById("table");

    table.innerHTML = "";

    students.forEach((s, index) => {
        table.innerHTML += `
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.course}</td>
            <td>
                <button onclick="editStudent(${index})">Edit</button>
                <button onclick="deleteStudent(${index})">Delete</button>
            </td>
        </tr>`;
    });
}

// DELETE
function deleteStudent(index) {
    let students = getStudents();
    students.splice(index, 1);
    saveStudents(students);
    displayStudents();
}

// EDIT
function editStudent(index) {
    let students = getStudents();
    let s = students[index];

    showSection('add');

    document.getElementById("id").value = s.id;
    document.getElementById("name").value = s.name;
    document.getElementById("course").value = s.course;

    deleteStudent(index); // remove old
}

</script>

</body>
</html>
